<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yer İşaretleri</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #1a1a1a;
            color: #e8eaed;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #e8eaed;
        }

        .add-bookmark {
            background: #333333;
            border: 1px solid #3c4043;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .add-bookmark input {
            width: 100%;
            padding: 10px;
            background: #202124;
            border: 1px solid #3c4043;
            border-radius: 4px;
            color: #e8eaed;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .add-bookmark button {
            background: #8ab4f8;
            color: #1a1a1a;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .add-bookmark button:hover {
            background: #aecbfa;
        }

        .bookmarks-list {
            display: grid;
            gap: 8px;
        }

        .bookmark-item {
            background: #333333;
            border: 1px solid #3c4043;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.2s;
        }

        .bookmark-item:hover {
            background: #3c4043;
        }

        .bookmark-favicon {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            background: #202124;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .bookmark-favicon img {
            width: 16px;
            height: 16px;
        }

        .bookmark-info {
            flex: 1;
            min-width: 0;
        }

        .bookmark-title {
            font-size: 14px;
            font-weight: 500;
            color: #e8eaed;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bookmark-url {
            font-size: 12px;
            color: #9aa0a6;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bookmark-actions {
            display: flex;
            gap: 8px;
        }

        .bookmark-actions button {
            background: none;
            border: none;
            color: #9aa0a6;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: color 0.2s, background 0.2s;
        }

        .bookmark-actions button:hover {
            color: #e8eaed;
            background: #3c4043;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #9aa0a6;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1><i class="fa-solid fa-bookmark"></i> Yer İşaretleri</h1>

        <div class="add-bookmark">
            <input type="text" id="bookmarkUrl" placeholder="URL girin...">
            <button onclick="addBookmark()">Ekle</button>
        </div>

        <div class="bookmarks-list" id="bookmarksList"></div>
    </div>

    <script>
        let bookmarks = [];

        function loadBookmarks() {
            try {
                const data = new URLSearchParams(window.location.search).get('data');
                if (data) {
                    const parsed = JSON.parse(data);
                    bookmarks = parsed.bookmarks || [];
                }
            } catch (e) {
                console.error('Failed to load bookmarks:', e);
            }
            renderBookmarks();
        }

        function renderBookmarks() {
            const list = document.getElementById('bookmarksList');
            if (!bookmarks || bookmarks.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-bookmark"></i>
                        <p>Henüz yer işareti yok</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = bookmarks.map(bookmark => `
                <div class="bookmark-item">
                    <div class="bookmark-favicon">
                        <img src="https://www.google.com/s2/favicons?domain=${new URL(bookmark.url).hostname}" alt="" onerror="this.style.display='none'">
                        <i class="fa-solid fa-bookmark" style="display:${bookmark.favicon ? 'none' : 'block'}"></i>
                    </div>
                    <div class="bookmark-info">
                        <div class="bookmark-title">${escapeHtml(bookmark.title || bookmark.url)}</div>
                        <div class="bookmark-url">${escapeHtml(bookmark.url)}</div>
                    </div>
                    <div class="bookmark-actions">
                        <button onclick="openBookmark('${escapeHtml(bookmark.url)}')" title="Aç">
                            <i class="fa-solid fa-arrow-up-right-from-square"></i>
                        </button>
                        <button onclick="deleteBookmark('${bookmark.id}')" title="Sil">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function addBookmark() {
            const urlInput = document.getElementById('bookmarkUrl');
            const url = urlInput.value.trim();
            if (!url) return;

            let finalUrl = url;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                finalUrl = 'https://' + url;
            }

            const bookmark = {
                id: Date.now().toString(),
                url: finalUrl,
                title: finalUrl,
                date: new Date().toISOString()
            };

            bookmarks.push(bookmark);
            saveBookmarks();
            renderBookmarks();
            urlInput.value = '';
        }

        function deleteBookmark(id) {
            bookmarks = bookmarks.filter(b => b.id !== id);
            saveBookmarks();
            renderBookmarks();
        }

        function openBookmark(url) {
            window.open(url, '_blank');
        }

        function saveBookmarks() {
            localStorage.setItem('xenixa_bookmarks', JSON.stringify(bookmarks));
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadBookmarks();
    </script>
</body>

</html>
